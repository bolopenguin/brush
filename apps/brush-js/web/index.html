<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brush — JS demo</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0;
        height: 100%;
        background: #20292b;
        font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #app {
        padding: 24px;
        max-width: 1100px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
      }
      @media (min-width: 900px) {
        #app { grid-template-columns: 1fr 360px; }
        #app > h1 { grid-column: 1 / -1; }
      }
      #app > h1 { margin: 0; color: #e6e8ee; font-size: 22px; font-weight: 600; }
      #viewer-wrap {
        background: #0a0c10;
        border: 1px solid #2a2f3a;
        border-radius: 6px;
        position: relative;
        min-height: 480px;
        display: none; /* shown once training starts */
      }
      #viewer-wrap.active { display: block; }
      #viewer { width: 100%; height: 100%; display: block; cursor: grab; }
      #viewer:active { cursor: grabbing; }
      #ui { display: flex; flex-direction: column; gap: 0; min-width: 0; }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>Brush — JS library demo</h1>
      <div id="viewer-wrap">
        <canvas id="viewer"></canvas>
      </div>
      <div id="ui"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
